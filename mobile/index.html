<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#1f251f"><link rel="manifest" href="./manifest.webmanifest"><link rel="stylesheet" href="./style.css"><title>Framewise</title></head><body>
<main><header><a class="brand"><i>F</i>framewise</a><span id="connection">未连接</span></header><section id="join" class="join"><p class="eyebrow">LIVE FIGMA PREVIEW</p><h1>在真机上，<br>看见你的画板。</h1><p>在 Figma 插件中创建会话后，输入会话码即可开始。</p><input id="relay" placeholder="中继服务地址，例如 https://preview.example.com"><input id="session" placeholder="6 位会话码" autocapitalize="characters"><input id="key" placeholder="查看密钥（来自插件链接）"><button id="connect">连接预览</button><small>首次连接后可“添加到主屏幕”，像普通 App 一样使用。</small></section>
<section id="viewer" class="viewer hidden"><div class="meta"><span id="frameName">等待 Figma 画板…</span><span id="frameSize"></span></div><div class="stage"><img id="frame" alt="Figma 画板预览"></div><div class="toolbar"><select id="device"><option value="se">iPhone SE · 375×667</option><option value="pro" selected>iPhone 16 Pro · 402×874</option><option value="max">iPhone 16 Pro Max · 440×956</option></select><button id="fit">完整显示</button></div></section></main><script src="./app.js"></script></body></html>
