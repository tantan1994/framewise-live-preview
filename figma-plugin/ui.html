<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><style>
*{box-sizing:border-box}body{font:12px Inter,Arial,sans-serif;color:#202620;margin:0;padding:18px;background:#fff}.brand{font-weight:700;font-size:15px;letter-spacing:-.3px}.brand i{display:inline-grid;place-items:center;background:#202620;color:#d9f66a;border-radius:5px;width:18px;height:18px;font-style:normal;margin-right:6px}.sub{color:#7d847b;line-height:1.55;margin:7px 0 17px}.label{display:block;font-size:11px;font-weight:600;margin-bottom:6px}input{border:1px solid #dfe2dc;border-radius:6px;width:100%;padding:9px;font-size:12px}button{border:0;border-radius:6px;background:#263025;color:#fff;width:100%;padding:10px;font-weight:600;margin-top:9px;cursor:pointer}.status{margin-top:15px;padding:10px;background:#f6f7f4;border-radius:7px;line-height:1.5}.status b{display:block}.status span{color:#778075}.session{margin-top:12px;display:none}.session.show{display:block}.code{font:600 21px ui-monospace,monospace;letter-spacing:2px}.url{font:10px ui-monospace,monospace;word-break:break-all;color:#687163;margin-top:5px}.error{color:#bf3e34;margin-top:8px}.sync{color:#6d8e25;margin-top:8px}</style></head><body>
<div class="brand"><i>F</i>Framewise Live Preview</div><p class="sub">选中一个画板，手机端便会收到与当前设计相符的预览。</p>
<label class="label">中继服务地址</label><input id="relay" value="https://YOUR_RELAY_DOMAIN" spellcheck="false"><button id="start">开始实时预览</button>
<div class="status"><b id="selection">请在画布中选中一个 Frame</b><span id="size">支持 Frame、组件、实例、分组</span></div>
<div id="session" class="session"><span>手机端输入会话码</span><div class="code" id="code"></div><div class="url" id="url"></div><button id="sync">立即同步</button></div><div class="error" id="error"></div><div class="sync" id="syncState"></div>
<script>const $=s=>document.querySelector(s);$('#start').onclick=()=>parent.postMessage({pluginMessage:{type:'start',relayUrl:$('#relay').value}},'*');$('#sync').onclick=()=>parent.postMessage({pluginMessage:{type:'sync-now'}},'*');onmessage=e=>{const m=e.data.pluginMessage;if(!m)return;if(m.type==='selection'){$('#selection').textContent=m.name||'请在画布中选中一个 Frame';$('#size').textContent=m.size?m.size+' px':'支持 Frame、组件、实例、分组'}if(m.type==='started'){$('#session').classList.add('show');$('#code').textContent=m.id;$('#url').textContent=m.relayUrl+'/mobile/?relay='+encodeURIComponent(m.relayUrl)+'&session='+m.id+'&key='+m.viewerKey;$('#start').textContent='已连接'}if(m.type==='syncing')$('#syncState').textContent='正在同步…';if(m.type==='synced')$('#syncState').textContent='已同步到手机';if(m.type==='error')$('#error').textContent=m.message}</script>
</body></html>
